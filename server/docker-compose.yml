services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travel
    ports:
      - "5432:5432"
    volumes:
      - travel-postgres-data:/var/lib/postgresql/data

volumes:
  travel-postgres-data:
